image: ubuntu:latest

stages:
  - test
  - site

cache:
  paths:
    - node_modules
    - /usr/bin/wget

tests:
  stage: test
  before_script:
    - apt install wget
    - cd src/test/runtime
  script: ./run_tests.sh

pages:
  stage: site
  image: node:18.19.1
  script:
    - npm install
    - npx antora antora-playbook.yml
    - cp -r build/site public
    - ls -R public
  artifacts:
    paths:
      - public
  needs:
    - tests