image: ubuntu:latest

stages:
  - test
  - docker
  - site

cache:
  paths:
    - node_modules

variables:
  FENRIR_IMAGE_NAME: "fenrir-base"

tests:
  stage: test
  before_script:
    - apt-get update && apt-get install -y wget git
    - cd src/test/runtime
  script: ./run_tests.sh
  variables:
    FENRIR_IN_DOCKER: "-v"

pages:
  stage: site
  image: node:18.19.1
  script:
    - npm install
    - npx antora antora-playbook.yml
    - cp -r build/site public
    - ls -R public
  artifacts:
    paths:
      - public
  needs:
    - tests
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.docker-default:
  image: docker
  services:
    - docker:dind
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin


docker-amd:
  stage: docker
  extends: .docker-default
  script:
    - docker buildx build --platform linux/amd64 -t "$IMAGE_TAG-amd" -f docker/base.Dockerfile .
    - docker push "$IMAGE_TAG-amd"
  needs:
    - tests
  rules:
    - if: $CI_COMMIT_BRANCH

docker-arm:
  stage: docker
  extends: .docker-default
  script:
    - docker buildx build --platform linux/arm64 -t "$IMAGE_TAG-arm" -f docker/base.Dockerfile .
    - docker push "$IMAGE_TAG-arm"
  needs:
    - tests
  rules:
    - if: $CI_COMMIT_BRANCH

docker-all:
  stage: docker
  extends: .docker-default
  script:
    - docker manifest create   "$IMAGE_TAG" "$IMAGE_TAG-amd" "$IMAGE_TAG-arm"
    - docker manifest annotate "$IMAGE_TAG" "$IMAGE_TAG-amd" --arch amd64
    - docker manifest annotate "$IMAGE_TAG" "$IMAGE_TAG-arm" --arch arm64
    - docker manifest push "$IMAGE_TAG"
  needs:
    - docker-amd
    - docker-arm
  rules:
    - if: $CI_COMMIT_BRANCH

docker-version:
  stage: docker
  extends: .docker-default
  script:
    - docker buildx build --platform linux/amd64 -t "$IMAGE-amd" -f docker/base.Dockerfile .
    - docker push "$IMAGE-amd"
    - docker buildx build --platform linux/arm64 -t "$IMAGE-arm" -f docker/base.Dockerfile .
    - docker push "$IMAGE-arm"
    - docker manifest create   "$IMAGE" "$IMAGE-amd" "$IMAGE-arm"
    - docker manifest annotate "$IMAGE" "$IMAGE-amd" --arch amd64
    - docker manifest annotate "$IMAGE" "$IMAGE-arm" --arch arm64
    - docker manifest push "$IMAGE"
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:$CI_COMMIT_TAG
  rules:
    - if: '$CI_COMMIT_TAG'

docker-latest-manual:
  stage: docker
  extends: .docker-default
  script:
    - docker manifest create   "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest" "$IMAGE_TAG-amd" "$IMAGE_TAG-arm"
    - docker manifest annotate "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest" "$IMAGE_TAG-amd" --arch amd64
    - docker manifest annotate "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest" "$IMAGE_TAG-arm" --arch arm64
    - docker manifest push "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest"
  needs:
    - docker-amd
    - docker-arm
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH

docker-latest:
  stage: docker
  extends: .docker-default
  script:
    - docker manifest create   "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest" "$IMAGE-amd" "$IMAGE-arm"
    - docker manifest annotate "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest" "$IMAGE-amd" --arch amd64
    - docker manifest annotate "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest" "$IMAGE-arm" --arch arm64
    - docker manifest push "$CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:latest"
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:$CI_COMMIT_TAG
  needs:
    - docker-version
  rules:
    - if: '$CI_COMMIT_TAG'
