name: Build base image
on:
  push:
    branches:
      - main
      - v*.*.*
    tags:
      - v*.*.*

jobs:
  build-base-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/arm64,linux/amd64
          file: docker/base.Dockerfile
          push: true
          tags: ghcr.io/1bah/fenrir-base:${{ github.ref_name }},ghcr.io/1bah/fenrir-base:latest

  build-fend-image:
    runs-on: ubuntu-latest
    needs: build-base-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/arm64,linux/amd64
          file: docker/fend.Dockerfile
          push: true
          tags: ghcr.io/1bah/fenrir-fend:${{ github.ref_name }},ghcr.io/1bah/fenrir-fend:latest
