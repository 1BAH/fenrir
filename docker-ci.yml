.docker-default:
  image: docker
  services:
    - docker:dind
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE/$FENRIR_IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

.amd:
  extends: .docker-default
  variables: 
    BUILD_SCRIPT: base
  script:
    - echo "Building amd64 image from 'docker/$BUILD_SCRIPT.Dockerfile'"
    - docker buildx build --platform linux/amd64 -t "$IMAGE-amd" -f docker/$BUILD_SCRIPT.Dockerfile .
    - docker push "$IMAGE-amd"

.arm:
  extends: .docker-default
  variables:
    BUILD_SCRIPT: base
  script:
    - echo "Building arm64 image from 'docker/$BUILD_SCRIPT.Dockerfile'"
    - docker buildx build --platform linux/arm64 -t "$IMAGE-arm" -f docker/$BUILD_SCRIPT.Dockerfile .
    - docker push "$IMAGE-arm"

.manifest:
  extends: .docker-default
  script:
    - docker manifest create   "$IMAGE" "$COMPONENT_IMAGE-amd" "$COMPONENT_IMAGE-arm"
    - docker manifest annotate "$IMAGE" "$COMPONENT_IMAGE-amd" --arch amd64
    - docker manifest annotate "$IMAGE" "$COMPONENT_IMAGE-arm" --arch arm64
    - docker manifest push "$IMAGE"
